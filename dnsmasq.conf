# Interfaz donde escuchará el servidor
interface=ens33
# No escuchar en otras interfaces
bind-interfaces
# DHCP para los clientes (rango de IPs)
dhcp-range=192.168.50.100,192.168.50.200,12h
# Puerto 80 redirigido al portal (para forzar la autenticación)
address=/www.bing.com/192.168.50.1
address=/www.google.com/192.168.50.1
address=/www.youtube.com/192.168.50.1
# Redirección de cualquier consulta DNS al servidor (captura todo)
dhcp-option=3,192.168.50.1
dhcp-option=6,192.168.50.1
# Tiempo de concesión corto para pruebas
dhcp-leasefile=/var/lib/misc/dnsmasq.leases
